schema_version: 1
id: JCG-CLAIM-0009
statement: >-
  For a Keller map over the complex numbers, polynomial invertibility,
  properness, emptiness of the nonproperness set, and codimension at least 2 of
  that set are equivalent, with the empty set assigned infinite codimension.
posture: unconditional-theorem-claim
introduced_by: JCG-C-0002
dependencies: []
claimed_implications:
  - A proper Keller map over the complex numbers is a polynomial automorphism.
does_not_establish:
  - Properness of every Keller map.
  - The Jacobian conjecture in dimension 2.
