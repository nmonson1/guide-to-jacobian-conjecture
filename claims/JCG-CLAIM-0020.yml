schema_version: 1
id: JCG-CLAIM-0020
statement: >-
  The Gaussian Moments Conjecture is false in every dimension n at least 3:
  JCG-C-0011 gives a five-term quartic witness in three real Gaussian variables
  and a six-term cubic witness in four variables.
posture: unconditional-theorem-claim
introduced_by: JCG-C-0011
dependencies: []
claimed_implications:
  - A fixed mixed moment is nonzero for every positive exponent in the displayed examples.
does_not_establish:
  - Failure of the Gaussian Moments Conjecture in dimension 2.
  - That the small examples were obtained by translating the Jacobian counterexample.
