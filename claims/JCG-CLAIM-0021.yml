statement: >-
  The explicit map in JCG-C-0013 has the form G(U)=U+H(U) over Q^24, with
  every nonzero component of H homogeneous cubic, determinant 1, 54 nonzero
  cubic monomials, and a displayed collision of two distinct rational points.
