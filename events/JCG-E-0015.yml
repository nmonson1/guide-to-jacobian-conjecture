title: Small explicit Gaussian Moments counterexamples are posted
category: downstream-counterexample
summary: >-
  Long gives a five-term quartic witness in three real Gaussian variables and
  a six-term cubic witness in four variables, proving failure in every
  dimension at least three. The paper says these examples were motivated by,
  but not mechanically derived from, the Jacobian map.
