{% extends "base.html" %}

{% block announce %}
<span class="announce-copy">
  Baseline as of {{ config.extra.status_date }} · Record first, exposition later ·
  <a href="{{ 'chronology/' | url }}">See the chronology</a>
</span>
{% endblock %}

{% block extrahead %}
  {{ super() }}
  <meta name="theme-color" content="#123a3b">
  <meta name="author" content="Guide to the Jacobian Conjecture contributors">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Guide to the Jacobian Conjecture">
  <meta property="og:description" content="A chronological, versioned record of Jacobian-conjecture events, contributions, and claims.">
  <meta property="og:url" content="https://nmonson1.github.io/guide-to-jacobian-conjecture/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Guide to the Jacobian Conjecture",
    "url": "https://nmonson1.github.io/guide-to-jacobian-conjecture/",
    "description": "A chronological, versioned record of Jacobian-conjecture events, contributions, and claims."
  }
  </script>
{% endblock %}
